const fmt=(d,t)=>{

return new Date(d+"T"+t+"Z")

.toLocaleTimeString(

league.includes("Coppa Italia") ||

function europeanBroadcaster(league){


let channels=[];


league=league || "";





Object.keys(europeanTV).forEach(key=>{


if(league.includes(key)){


channels.push(...europeanTV[key]);


}


});





channels=[...new Set(channels)];





return channels.map(channel=>`

display:flex;

`).join("");

async function load(){


const now=new Date();



const today=

now.getFullYear()

+"-"

+String(now.getMonth()+1).padStart(2,"0")

+"-"

+String(now.getDate()).padStart(2,"0");





let all=[];





await Promise.all(



leagues.map(async(id)=>{



try{



const r=await fetch(


"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id


);





const j=await r.json();





if(j.events){



j.events.forEach(ev=>{



if(ev.dateEvent===today){



all.push(ev);



}



});



}





}catch(e){



console.log("Gabim liga",id);



}



})



);







/* HEQ DUBLIMET */


all=[



...new Map(



all.map(ev=>[ev.idEvent,ev])



).values()



];







/* RENDIT SIPAS ORËS */


all.sort((a,b)=>{



const da=new Date(


`${a.dateEvent}T${a.strTime||"00:00:00"}Z`


);



const db=new Date(


`${b.dateEvent}T${b.strTime||"00:00:00"}Z`


);



return da-db;



});

all.map(ev=>`

cards=[...document.querySelectorAll(".match")];



focus=0;





if(cards[0]){



cards[0].classList.add("tv-focus");



}





}


function pause(){


auto=false;



setTimeout(()=>{


auto=true;


},7000);



}







document.addEventListener("keydown",e=>{



if(!cards.length)return;





pause();





cards.forEach(c=>{


c.classList.remove("tv-focus");


});







if(e.key==="ArrowDown"){



focus=(focus+1)%cards.length;



}







if(e.key==="ArrowUp"){



focus=(focus-1+cards.length)%cards.length;



}







cards[focus].classList.add("tv-focus");





cards[focus].scrollIntoView({


behavior:"smooth",


block:"center"


});



});









(function loop(){



if(auto && wrap.scrollHeight>wrap.clientHeight){



wrap.scrollTop++;






if(wrap.scrollTop>=wrap.scrollHeight-wrap.clientHeight){



wrap.scrollTop=0;



}



}





requestAnimationFrame(loop);



})();


load();



setInterval(load,60000);
