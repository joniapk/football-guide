<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Football Guide PRO</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#070a0f;
color:white;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}


/* HEADER */

.header{

height:70px;
background:#10151d;
display:flex;
align-items:center;
justify-content:center;

font-size:26px;
font-weight:900;

border-bottom:2px solid #00ff99;

color:#00ff99;

}



/* LIST */

.wrap{

height:calc(100vh - 70px);
padding:20px;

overflow-y:auto;

}


/* MATCH CARD */

.match{

background:
linear-gradient(135deg,#151b25,#0e131b);

margin-bottom:15px;

padding:20px;

border-radius:18px;

border:1px solid #202b3b;

transition:.3s;

box-shadow:0 5px 20px #000;

}



.match:hover{

transform:scale(1.03);

border-color:#00ff99;

}



/* LEAGUE */

.league{

color:#8c98aa;

font-size:14px;

margin-bottom:12px;

}



/* ROW */

.row{

display:flex;

align-items:center;

justify-content:space-between;

}



/* TEAM */


.team{

display:flex;

align-items:center;

gap:12px;

width:38%;

font-size:22px;

font-weight:bold;

}


.team img{

width:45px;

height:45px;

object-fit:contain;

border-radius:50%;

background:#fff;

padding:3px;

}



/* CENTER */


.center{

width:24%;

text-align:center;

}


.time{

color:#00ff99;

font-size:22px;

font-weight:bold;

}


.status{

display:inline-block;

background:#ff0033;

padding:5px 12px;

border-radius:20px;

font-size:12px;

margin-top:8px;

font-weight:bold;

}



/* TV SCROLL BAR */

::-webkit-scrollbar{

width:6px;

}

::-webkit-scrollbar-thumb{

background:#00ff99;
border-radius:10px;

}


</style>


</head>


<body>


<div class="header">

⚽ FUTBOLLI SOT NË PLAY SHQIP

</div>



<div class="wrap" id="games">

Duke ngarkuar ndeshjet...

</div>




<script>


const leagues=[

4304,
4328,
4335,
4332,
4331,
4334,
4337,
4338,
4340,
4341

];


let all=[];



function formatTime(date,time){

if(!date || !time)
return "--:--";


let d=new Date(date+"T"+time+":00Z");


return d.toLocaleTimeString([],{

hour:"2-digit",
minute:"2-digit"

});

}



async function load(){


all=[];


for(let id of leagues){


try{


let r=await fetch(

"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id

);


let d=await r.json();


if(d.events){

all.push(...d.events);

}


}catch(e){}


}


render();


}



function render(){


let box=document.getElementById("games");


if(all.length===0){

box.innerHTML="⚠️ Nuk ka ndeshje";

return;

}



box.innerHTML=all.map(ev=>


<div class="match">


<div class="league">

🏆 ${ev.strLeague || "Football"}

</div>



<div class="row">


<div class="team">

<img src="${ev.strHomeTeamBadge || 'https://via.placeholder.com/45'}">

${ev.strHomeTeam || ""}

</div>




<div class="center">


<div class="time">

⏰ ${formatTime(ev.dateEvent,ev.strTime)}

</div>


<div class="status">

NEXT MATCH

</div>


</div>




<div class="team" style="justify-content:flex-end;">


${ev.strAwayTeam || ""}


<img src="${ev.strAwayTeamBadge || 'https://via.placeholder.com/45'}">


</div>



</div>


</div>


).join("");



}




// AUTO SCROLL TV

setInterval(()=>{


let el=document.querySelector(".wrap");


el.scrollBy({

top:180,

behavior:"smooth"

});


if(el.scrollTop+el.clientHeight>=el.scrollHeight){

el.scrollTo({

top:0,

behavior:"smooth"

});

}


},5000);



load();


setInterval(load,60000);



</script>


</body>
</html>
