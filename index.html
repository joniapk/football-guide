<!DOCTYPE html>
<html lang="sq">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football TV Guide</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#05070b;
color:white;
font-family:Arial, sans-serif;
overflow:hidden;
}


.app{
display:flex;
height:100vh;
}


/* MENU */

.sidebar{

width:270px;
background:#0d131c;
padding:20px;

}


.logo{

font-size:28px;
font-weight:bold;
color:#00ff99;
margin-bottom:30px;

}


.menu{

padding:15px;
margin-bottom:10px;
border-radius:12px;
font-size:20px;
color:#aaa;

}


.menu.focus{

background:#00ff99;
color:#000;

}



/* CONTENT */

.content{

flex:1;
padding:25px;

}


.header{

display:flex;
justify-content:space-between;
align-items:center;

}


.title{

font-size:32px;
font-weight:bold;

}


.clock{

font-size:28px;
color:#00ff99;

}



#status{

color:#aaa;
font-size:18px;

}



/* MATCH LIST */


.matches{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-top:20px;

}



.match{

background:#111923;
border-radius:18px;
padding:20px;
height:190px;

border:2px solid transparent;

display:flex;
flex-direction:column;
justify-content:space-between;

}



.match.focus{

border-color:#00ff99;
transform:scale(1.05);

}



.time{

color:#00ff99;
font-size:22px;
font-weight:bold;

}



.teams{

text-align:center;
font-size:21px;
font-weight:bold;

}



.logo-team{

width:45px;
height:45px;
background:white;
border-radius:50%;
vertical-align:middle;
padding:3px;

}



.league{

color:#9aa8b8;
font-size:15px;

}




/* PLAYER */

.player{

display:none;

position:fixed;
top:0;
left:0;

width:100%;
height:100vh;

background:#05070b;

z-index:99;

}



.player h1{

background:#0d131c;
color:#00ff99;

padding:25px;

margin:0;

}



.player-box{

height:80%;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

font-size:30px;

}



.play{

width:100px;
height:100px;

border-radius:50%;

background:#00ff99;

color:black;

display:flex;
justify-content:center;
align-items:center;

font-size:45px;

}


</style>

</head>


<body>


<div class="app">


<div class="sidebar">


<div class="logo">
⚽ FOOTBALL TV
</div>


<div class="menu focus" data-league="all">
🏠 Të gjitha
</div>


<div class="menu" data-league="Premier League">
🇬🇧 Premier League
</div>


<div class="menu" data-league="La Liga">
🇪🇸 La Liga
</div>


<div class="menu" data-league="Serie A">
🇮🇹 Serie A
</div>


<div class="menu" data-league="Bundesliga">
🇩🇪 Bundesliga
</div>


<div class="menu" data-league="UEFA Champions League">
🏆 Champions League
</div>


</div>




<div class="content">


<div class="header">

<div class="title">
Ndeshjet Sot
</div>


<div class="clock" id="clock">
00:00
</div>


</div>


<p id="status">
Duke kërkuar ndeshjet...
</p>


<div class="matches" id="matches">

</div>


</div>


</div>




<div class="player" id="player">

<h1>
⚽ Football Player
</h1>


<div class="player-box">

<div class="play">
▶
</div>


<div id="playerName">
Ndeshja
</div>


</div>


</div>
<script>

let allMatches = [];

let currentLeague = "all";

let cards = [];



function getDate(){

let d = new Date();

return d.getFullYear()+"-"+
String(d.getMonth()+1).padStart(2,"0")+"-"+
String(d.getDate()).padStart(2,"0");

}



// NGARKO NDESHJET

async function loadMatches(){


document.getElementById("status").innerHTML =
"Duke ngarkuar ndeshjet...";



let date=getDate();



try{


let response = await fetch(

"https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d="
+date+
"&s=Soccer"

);



let data = await response.json();



allMatches = data.events || [];



renderMatches(currentLeague);



document.getElementById("status").innerHTML =
"U gjetën "+allMatches.length+" ndeshje";



}

catch(error){


console.log(error);


document.getElementById("status").innerHTML =
"Gabim lidhjeje";


}



}





// SHFAQ NDESHJET


function renderMatches(league){



let box=document.getElementById("matches");



let list=allMatches;



if(league!="all"){


list=allMatches.filter(game=>


game.strLeague==league


);


}




if(list.length==0){


box.innerHTML=

"<h2>Nuk ka ndeshje për këtë ligë</h2>";


cards=[];

return;


}





box.innerHTML=list.map(game=>`


<div class="match">


<div class="time">

${game.strTime ?
game.strTime.substring(0,5)
:"--:--"}

</div>



<div class="teams">


${game.strHomeTeam}

<br>

<span style="color:#777">
VS
</span>

<br>


${game.strAwayTeam}



</div>




<div class="league">

🏆 ${game.strLeague}

</div>


</div>


`).join("");



cards=document.querySelectorAll(".match");

}





// KLIK LIGAT


document.querySelectorAll(".menu")
.forEach(item=>{


item.addEventListener("click",()=>{


document.querySelectorAll(".menu")
.forEach(x=>x.classList.remove("focus"));



item.classList.add("focus");



currentLeague=item.dataset.league;



renderMatches(currentLeague);



});


});






// ORA


function updateClock(){


let d=new Date();


document.getElementById("clock").innerHTML=

d.toLocaleTimeString("sq-AL",
{
hour:"2-digit",
minute:"2-digit"
});


}


setInterval(updateClock,1000);

updateClock();





// START


loadMatches();


// AUTO UPDATE 10 MINUTA

setInterval(loadMatches,600000);



let menuItems = document.querySelectorAll(".menu");

let menuIndex = 0;

let matchIndex = 0;

let tvMode = "menu";



function updateMenuFocus(){

menuItems.forEach(x=>{
x.classList.remove("focus");
});


menuItems[menuIndex].classList.add("focus");

}




function updateMatchFocus(){


cards.forEach(x=>{
x.classList.remove("focus");
});


if(cards[matchIndex]){

cards[matchIndex].classList.add("focus");

cards[matchIndex].scrollIntoView({

behavior:"smooth",

block:"center"

});

}


}




// TELEKOMANDA ANDROID TV


document.addEventListener("keydown",function(e){



// MENU


if(tvMode=="menu"){



if(e.key=="ArrowDown"){


menuIndex++;


if(menuIndex>=menuItems.length)

menuIndex=0;


updateMenuFocus();


}



if(e.key=="ArrowUp"){


menuIndex--;


if(menuIndex<0)

menuIndex=menuItems.length-1;


updateMenuFocus();


}




if(e.key=="ArrowRight"){


tvMode="matches";


matchIndex=0;

updateMatchFocus();


}



if(e.key=="Enter"){


currentLeague=

menuItems[menuIndex].dataset.league;


renderMatches(currentLeague);


tvMode="matches";


}




}





// NDESHJET



else{


if(e.key=="ArrowDown" ||
e.key=="ArrowRight"){


matchIndex++;


if(matchIndex>=cards.length)

matchIndex=0;


updateMatchFocus();


}





if(e.key=="ArrowUp" ||
e.key=="ArrowLeft"){


matchIndex--;


if(matchIndex<0)

matchIndex=cards.length-1;


updateMatchFocus();


}





if(e.key=="ArrowLeft"){


tvMode="menu";

updateMenuFocus();


}





if(e.key=="Enter"){


openPlayer();


}


}



});






// PLAYER


function openPlayer(){


if(!cards[matchIndex])

return;



let text=cards[matchIndex].innerText;



document.getElementById("playerName").innerHTML=
text;



document.getElementById("player").style.display="block";


}




// BACK TELEKOMANDA
</script>
</body>
</html>
