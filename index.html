<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football Guide PRO</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
background:#05080d;
color:white;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;

}


/* HEADER */

.header{

height:70px;

display:flex;

align-items:center;

justify-content:center;

background:#10151d;

color:#00ff99;

font-size:26px;

font-weight:900;

border-bottom:2px solid #00ff99;

letter-spacing:1px;

}




/* LIST */

.wrap{

height:calc(100vh - 70px);

padding:20px;

overflow-y:auto;

}



.match{

background:linear-gradient(135deg,#151b25,#0b1018);

padding:20px;

margin-bottom:15px;

border-radius:18px;

border:1px solid #263242;

box-shadow:0 8px 25px #000;

transition:.25s;

opacity:0;

animation:show .5s forwards;

}



@keyframes show{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}



/* TV FOCUS */


.tv-focus{

border:3px solid #00ff99;

transform:scale(1.04);

box-shadow:0 0 25px #00ff99;

}




.league{

color:#9aa7b8;

font-size:14px;

margin-bottom:15px;

}



/* ROW */


.row{

display:flex;

align-items:center;

justify-content:space-between;

}




.team{

width:38%;

display:flex;

align-items:center;

gap:12px;

font-size:22px;

font-weight:bold;

}



.team img{

width:48px;

height:48px;

border-radius:50%;

background:white;

padding:4px;

object-fit:contain;

}




.center{

width:24%;

text-align:center;

}



.time{

color:#00ff99;

font-size:25px;

font-weight:900;

}



.status{

display:inline-block;

margin-top:8px;

background:#ff0033;

padding:5px 14px;

border-radius:20px;

font-size:12px;

font-weight:bold;

}



/* SCROLL BAR */


::-webkit-scrollbar{

width:6px;

}

::-webkit-scrollbar-thumb{

background:#00ff99;

border-radius:10px;

}



</style>

</head>


<body>


<div class="header">

⚽ FUTBOLLI SOT NË PLAY SHQIP

</div>



<div class="wrap" id="games">

Duke ngarkuar ndeshjet...

</div>




<script>


const leagues=[

4304,
4328,
4335,
4332,
4331,
4334,
4337,
4338,
4340,
4341

];


let all=[];

let cards=[];

let position=0;

let paused=false;



function formatTime(date,time){


if(!date || !time)

return "--:--";


let d=new Date(

date+"T"+time+":00Z"

);


return d.toLocaleTimeString([],{

hour:"2-digit",

minute:"2-digit"

});


}




async function load(){


all=[];


for(let id of leagues){


try{


let r=await fetch(

"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id

);


let d=await r.json();



if(d.events)

all.push(...d.events);



}catch(e){}



}



render();


}




function render(){


let box=document.getElementById("games");



if(!all.length){

box.innerHTML="⚠️ Nuk ka ndeshje";

return;

}




box.innerHTML=all.map(ev=>`


<div class="match">


<div class="league">

🏆 ${ev.strLeague || "Football"}

</div>



<div class="row">


<div class="team">


<img src="${ev.strHomeTeamBadge || 'https://via.placeholder.com/48'}">


${ev.strHomeTeam || ""}


</div>




<div class="center">


<div class="time">

${formatTime(ev.dateEvent,ev.strTime)}

</div>


<div class="status">

NEXT MATCH

</div>


</div>




<div class="team" style="justify-content:flex-end;">


${ev.strAwayTeam || ""}


<img src="${ev.strAwayTeamBadge || 'https://via.placeholder.com/48'}">


</div>



</div>


</div>



`).join("");



initRemote();


}





/* =====================
 ANDROID TV REMOTE
===================== */


function initRemote(){


cards=[...document.querySelectorAll(".match")];

position=0;


if(cards[0])

cards[0].classList.add("tv-focus");


}




document.addEventListener("keydown",e=>{


paused=true;


cards.forEach(c=>c.classList.remove("tv-focus"));



if(e.key==="ArrowDown")

position++;



if(e.key==="ArrowUp")

position--;



if(position<0)

position=cards.length-1;



if(position>=cards.length)

position=0;




if(cards[position]){


cards[position].classList.add("tv-focus");


cards[position].scrollIntoView({

behavior:"smooth",

block:"center"

});


}



setTimeout(()=>{

paused=false;

},4000);



});





/* =====================
 AUTO SCROLL
===================== */


function autoScroll(){


let box=document.querySelector(".wrap");


if(!paused){

box.scrollTop+=0.35;

}



if(box.scrollTop+box.clientHeight>=box.scrollHeight){

box.scrollTop=0;

}



requestAnimationFrame(autoScroll);


}



autoScroll();





load();


setInterval(load,60000);



</script>


</body>
</html>
