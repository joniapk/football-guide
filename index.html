<!DOCTYPE html>
<html lang="sq">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Play Shqip - API-FOOTBALL Live & Upcoming</title>

    <style>
        :root {
            --bg-main: #070a0f;
            --card-bg: linear-gradient(145deg, #160a0a, #0d0303);
            --card-border: #2a1010;
            --accent-red: #e10600;
            --text-main: #ffffff;
            --text-sub: #a0a5b5;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .header {
            height: 75px;
            background: #0a0101;
            border-bottom: 2px solid var(--accent-red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 4px 20px rgba(225, 6, 0, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 900;
        }

        .play-logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid var(--accent-red);
        }

        .logo-text span {
            font-size: 24px;
            color: #fff;
            letter-spacing: 1px;
            display: block;
        }

        .logo-text small {
            font-size: 11px;
            color: var(--accent-red);
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(225, 6, 0, 0.15);
            border: 1px solid var(--accent-red);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            color: var(--accent-red);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-red);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(225, 6, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(225, 6, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(225, 6, 0, 0); }
        }

        .wrap {
            height: calc(100vh - 75px);
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-red) #0b0e14;
        }

        .match {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 18px 24px;
            margin-bottom: 16px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .tv-focus {
            border: 2px solid var(--accent-red) !important;
            transform: scale(1.02);
            box-shadow: 0 0 22px rgba(225, 6, 0, 0.7) !important;
            outline: none;
        }

        .league-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #d19ca0;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 14px;
            border-bottom: 1px dashed #2d1414;
            padding-bottom: 8px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .team {
            width: 38%;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 19px;
            font-weight: 800;
        }

        .team.home { justify-content: flex-start; text-align: left; }
        .team.away { justify-content: flex-end; text-align: right; }

        .team img {
            width: 46px;
            height: 46px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .center {
            text-align: center;
            min-width: 140px;
        }

        .score-box {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            background: #1e0505;
            padding: 4px 16px;
            border-radius: 10px;
            border: 1px solid #4a1010;
            display: inline-block;
        }

        .time-box {
            font-size: 18px;
            color: var(--accent-red);
            font-weight: bold;
        }

        .status-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-live {
            background: var(--accent-red);
            color: #fff;
            animation: pulse 1.5s infinite;
        }

        .status-upcoming {
            background: #201212;
            color: #ff8a80;
            border: 1px solid #5c1d1d;
        }

        .broadcasters {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .channel-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(225, 6, 0, 0.1);
            border: 1px solid var(--accent-red);
            padding: 3px 8px;
            border-radius: 6px;
            color: #ff5252;
            font-size: 11px;
            font-weight: bold;
        }

        .channel-tag img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            border-radius: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sub);
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo">
            <img class="play-logo" src="https://i.ibb.co/Kpd6bW8X/logo-256.png" alt="Play Shqip Logo" onerror="this.src='https://via.placeholder.com/48?text=PS'">
            <div class="logo-text">
                <span>PLAY SHQIP</span>
                <small>API-FOOTBALL LIVE & UPCOMING</small>
            </div>
        </div>

        <div class="live-indicator">
            <div class="pulse-dot"></div>
            <span id="date-display">SOT</span>
        </div>
    </div>

    <div class="wrap" id="games">
        <div class="empty-state">Duke ngarkuar ndeshjet nga API-FOOTBALL...</div>
    </div>

    <script>
        // LISTA E TË GJITHË ÇELËSAVE TË TU TË API-FOOTBALL
        const API_FOOTBALL_KEYS = [
            "59483a535bf40f0b046dc6569af667ad",
            "5eaa86f0356ebf2b92148eeb7e5070db",
            "c53b107e31ea98ade5b9af41c4248b34",
            "9233fb866918f74414b30ab14dc25fc3",
            "30fb4ac4269be3cf9f42a6616add1df2",
            "046adb8debace9ee2c3c6bc956d6010e",
            "a7bf20eb5a91bf60fd2d01e6effe3624"
        ];

        let currentKeyIndex = 0;

        function getNextKey() {
            const key = API_FOOTBALL_KEYS[currentKeyIndex];
            currentKeyIndex = (currentKeyIndex + 1) % API_FOOTBALL_KEYS.length;
            return key;
        }

        // LOGOT E KANALEVE TV
        const tvLogos = {
            "Super Sport AL": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRkn0aMGtp1VLY3UMIrfsiyD1PBe-k-NBvnRtZOWep4iQ&s=10",
            "Tring Sport AL": "https://play-lh.googleusercontent.com/xj8GLCiviP_leV_eIzw3o-MLIzkNx7Uq6lW3VT7u9A3ZhpMenjJQyzc2egadTkEKSIaOnyIg4UASqUO2VL-nGQ",
            "Art Sport KS": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8GbjNRnIknmPljrVN4I0qixtO3cClJOnmvg&s",
            "RTSH Sport AL": "https://r2.thesportsdb.com/images/media/channel/logo/nfdq4d1630964082.png"
        };

        function getBroadcasters(leagueName) {
            let channels = [];
            const l = (leagueName || "").toLowerCase();

            if (l.includes("premier league") || l.includes("la liga") || l.includes("bundesliga") || 
                l.includes("ligue 1") || l.includes("europa league") || l.includes("conference") || 
                l.includes("nations league") || l.includes("world cup") || l.includes("euro")) {
                channels.push("Super Sport AL");
            }

            if (l.includes("serie a") || l.includes("champions league") || l.includes("coppa italia") || l.includes("primeira liga")) {
                channels.push("Tring Sport AL");
            }

            if (l.includes("champions league") || l.includes("europa league") || l.includes("conference") || 
                l.includes("serie a") || l.includes("la liga") || l.includes("ligue 1")) {
                channels.push("Art Sport KS");
            }

            if (l.includes("albania") || l.includes("superliga") || l.includes("kosovo") || l.includes("kupa")) {
                channels.push("RTSH Sport AL");
            }

            channels = [...new Set(channels)];

            return channels.map(ch => `
                <div class="channel-tag">
                    <img src="${tvLogos[ch] || 'https://via.placeholder.com/18'}" alt="${ch}">
                    ${ch}
                </div>
            `).join("");
        }

        let cards = [];
        let focusIndex = 0;
        let autoScroll = true;
        let refreshTimer = null;

        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById("date-display").innerText = `SOT (${new Date().toLocaleDateString('sq-AL', { day: '2-digit', month: '2-digit' })})`;

        function formatTime(utcDateStr) {
            if (!utcDateStr) return "--:--";
            const date = new Date(utcDateStr);
            return date.toLocaleTimeString("sq-AL", { hour: "2-digit", minute: "2-digit", hour12: false });
        }

        // MARRJA E TË DHËNAVE ME KALIM AUTOMATIK TE ÇELËSI TJETËR
        async function fetchApiFootballMatches() {
            for (let attempt = 0; attempt < API_FOOTBALL_KEYS.length; attempt++) {
                const activeKey = getNextKey();
                try {
                    console.log(`Po provoj me API Key index [${currentKeyIndex - 1}]: ${activeKey}`);
                    const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${todayStr}`, {
                        method: "GET",
                        headers: { "x-apisports-key": activeKey }
                    });

                    // Nëse merr nga servisi status 429 apo 403 (Limit ose i pabllokuar)
                    if (response.status === 429 || response.status === 403) {
                        console.warn(`Çelësi [${activeKey}] dha status ${response.status}. Po kaloj te tjetri...`);
                        continue;
                    }

                    if (!response.ok) throw new Error(`Gabim nga API-FOOTBALL (Status: ${response.status})`);

                    const data = await response.json();

                    // Kontrollon nëse API-Sports kthen objekt gabimi brenda JSON (p.sh. request limit reached)
                    if (data.errors && Object.keys(data.errors).length > 0) {
                        console.warn(`Çelësi [${activeKey}] ktheu gabim nga API:`, data.errors, "Po kaloj te tjetri...");
                        continue;
                    }

                    if (data.response) {
                        console.log(`Sukses me çelësin [${activeKey}]!`);
                        return data.response.map(item => ({
                            id: item.fixture.id,
                            league: item.league.name,
                            homeTeam: item.teams.home.name,
                            homeBadge: item.teams.home.logo,
                            awayTeam: item.teams.away.name,
                            awayBadge: item.teams.away.logo,
                            time: item.fixture.date,
                            statusShort: item.fixture.status.short,
                            elapsed: item.fixture.status.elapsed,
                            scoreHome: item.goals.home,
                            scoreAway: item.goals.away
                        }));
                    }
                } catch (e) {
                    console.error("Dështoi kërkesa me çelësin:", activeKey, e);
                }
            }
            console.error("Të gjithë çelësat dështuan ose kanë euruar limitin ditor!");
            return [];
        }

        // NGARKIMI DHE FILTRIMI I NDESHJEVE
        async function loadMatches() {
            const rawMatches = await fetchApiFootballMatches();

            // STATUSAT QË PËRJASHTOHEN (PËRFUNDUAR OSE TË ANULLUARA)
            const finishedStatuses = ["FT", "AET", "PEN", "CANC", "ABD", "AWD", "WO"];
            const liveStatuses = ["1H", "HT", "2H", "ET", "BT", "P", "SUSP", "INT", "LIVE"];

            // FILTRIMI: MERR VETËM TË DISPONUESHME QË NUK KANË PËRFUNDUAR
            const activeMatches = rawMatches.filter(m => !finishedStatuses.includes(m.statusShort));

            const hasLive = activeMatches.some(m => liveStatuses.includes(m.statusShort));

            // RENDITJA: LIVE NË KRYE, PASTAJ UPCOMING SIPAS ORËS
            activeMatches.sort((a, b) => {
                const isALive = liveStatuses.includes(a.statusShort);
                const isBLive = liveStatuses.includes(b.statusShort);

                if (isALive && !isBLive) return -1;
                if (!isALive && isBLive) return 1;
                return new Date(a.time) - new Date(b.time);
            });

            renderUI(activeMatches);

            // SMART REFRESH
            clearTimeout(refreshTimer);
            if (hasLive) {
                refreshTimer = setTimeout(loadMatches, 30000); // 30 sekonda nëse ka ndeshje LIVE
            } else {
                refreshTimer = setTimeout(loadMatches, 300000); // 5 minuta nëse nuk ka ndeshje LIVE
            }
        }

        function renderUI(matches) {
            const container = document.getElementById("games");

            if (matches.length === 0) {
                container.innerHTML = `<div class="empty-state">Nuk ka ndeshje LIVE apo të ardhshme për sot në API-FOOTBALL ose të gjithë çelësat kanë euruar limitin.</div>`;
                return;
            }

            const liveStatuses = ["1H", "HT", "2H", "ET", "BT", "P", "SUSP", "INT", "LIVE"];

            container.innerHTML = matches.map(m => {
                const isLive = liveStatuses.includes(m.statusShort);

                let statusHTML = `<span class="status-badge status-upcoming">⏰ ${formatTime(m.time)}</span>`;
                let scoreHTML = `<div class="time-box">${formatTime(m.time)}</div>`;

                if (isLive) {
                    statusHTML = `<span class="status-badge status-live">🔴 LIVE ${m.elapsed ? m.elapsed + "'" : ''}</span>`;
                    scoreHTML = `<div class="score-box">${m.scoreHome ?? 0} - ${m.scoreAway ?? 0}</div>`;
                }

                return `
                    <div class="match" tabindex="0">
                        <div class="league-header">
                            <span>🏆 ${m.league}</span>
                            <span>PLAY SHQIP</span>
                        </div>

                        <div class="row">
                            <div class="team home">
                                <img src="${m.homeBadge}" alt="${m.homeTeam}" onerror="this.src='https://via.placeholder.com/46'">
                                <span>${m.homeTeam}</span>
                            </div>

                            <div class="center">
                                ${scoreHTML}
                                ${statusHTML}
                            </div>

                            <div class="team away">
                                <span>${m.awayTeam}</span>
                                <img src="${m.awayBadge}" alt="${m.awayTeam}" onerror="this.src='https://via.placeholder.com/46'">
                            </div>
                        </div>

                        <div class="broadcasters">
                            ${getBroadcasters(m.league)}
                        </div>
                    </div>
                `;
            }).join("");

            cards = [...document.querySelectorAll(".match")];
            focusIndex = 0;
            if (cards[0]) cards[0].classList.add("tv-focus");
        }

        // KONTROLLI ME SHIGJETA / TELEKOMANDË
        document.addEventListener("keydown", e => {
            if (!cards.length) return;

            autoScroll = false;
            setTimeout(() => { autoScroll = true; }, 10000);

            cards.forEach(c => c.classList.remove("tv-focus"));

            if (e.key === "ArrowDown") {
                focusIndex = (focusIndex + 1) % cards.length;
            } else if (e.key === "ArrowUp") {
                focusIndex = (focusIndex - 1 + cards.length) % cards.length;
            }

            if (cards[focusIndex]) {
                cards[focusIndex].classList.add("tv-focus");
                cards[focusIndex].scrollIntoView({ behavior: "smooth", block: "center" });
            }
        });

        // AUTO SCROLL
        const wrapEl = document.querySelector(".wrap");
        (function autoScrollLoop() {
            if (autoScroll && wrapEl.scrollHeight > wrapEl.clientHeight) {
                wrapEl.scrollTop += 1;
                if (wrapEl.scrollTop >= wrapEl.scrollHeight - wrapEl.clientHeight) {
                    wrapEl.scrollTop = 0;
                }
            }
            requestAnimationFrame(autoScrollLoop);
        })();

        // NISJA
        loadMatches();
    </script>
</body>

</html>
