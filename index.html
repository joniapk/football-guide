function fmt(d,t){


if(!d || !t)

return "--:--";



return new Date(

d+"T"+t+"Z"

)

.toLocaleTimeString(

"sq-AL",

{

hour:"2-digit",

minute:"2-digit",

hour12:false

}

);


}






/* DATA */

function fmtDate(d){


if(!d)

return "";



let date=new Date(d);



let months=[

"Janar",

"Mars",
"Prill",
"Maj",
"Qershor",
"Korrik",
"Gusht",
"Shtator",
"Tetor",
"Nëntor",
"Dhjetor"

];



return date.getDate()

.toString()

.padStart(2,"0")

+" "

+months[date.getMonth()]

+" "

+date.getFullYear();


}

/* 📺 FUNKSIONI FINAL I KANALEVE */


function getChannels(league){


let channels=[];



/* 1 - SHIKO KANALET SHQIPTARE */

channels.push(

...getAlbanianChannels(league)

);





/* 2 - NËSE NUK KA SHQIPTARE */

if(!channels.length){

...getEuropeanChannels(league)

);


}

/* 🔄 NGARKIMI I NDESHJEVE NGA API */


async function load(){


const now=new Date();



const today=

now.getFullYear()

+"-"

+String(now.getMonth()+1)

.padStart(2,"0")

+"-"

+String(now.getDate())

.padStart(2,"0");




let all=[];





await Promise.all(



leagues.map(async(id)=>{



try{



const r=await fetch(


"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id


);




const j=await r.json();





if(j.events){



j.events.forEach(ev=>{



const eventDate = new Date(ev.dateEvent);
const todayDate = new Date(today);

const diffDays = 
(eventDate - todayDate) / (1000 * 60 * 60 * 24);

if(diffDays >= 0 && diffDays <= 2){

    all.push(ev);

}



});



}





}catch(e){



console.log(

"Gabim liga",

id

);



}



})



);






/* HEQ DUBLIMET */


all=[


...new Map(


all.map(ev=>[

ev.idEvent,

ev

])


).values()


];






/* RENDITJA SIPAS ORËS */


all.sort((a,b)=>{


let da=new Date(


`${a.dateEvent}T${a.strTime || "00:00:00"}Z`


);



let db=new Date(


`${b.dateEvent}T${b.strTime || "00:00:00"}Z`


);



return da-db;


});






let html=[];



for(let ev of all){


html.push(

createMatchCard(ev)

);


}





games.innerHTML = html.length ?


html.join("")


:


`

text-align:center;

padding:30px;

font-size:18px;

color:#ccc;

">

🔄 Provo pas pak po përditësohen eventet e futbollit

/* AKTIVIZO KARTAT */

...document.querySelectorAll(".match")

cards[0].classList.add(

"tv-focus"

);


}



}

/* 🏟️ KRIJIMI I KARTËS SË NDESHJES */


function createMatchCard(ev){



let channels=getChannels(

);




let tvHTML=renderChannels(

channels

);

<div class="league">

</div>






<div class="row">





<div class="team">


<img src="${

ev.strHomeTeamBadge ||

'https://via.placeholder.com/50'

}">



${ev.strHomeTeam || ""}



</div>








<div class="center">





<div class="time">


📅 ${fmtDate(ev.dateEvent)}


<br>


⏰ ${fmt(

ev.dateEvent,

ev.strTime

)}

Transmetimi

${ev.strAwayTeam || ""}




<img src="${

ev.strAwayTeamBadge ||

'https://via.placeholder.com/50'

}">



</div>







</div>





</div>


`;



}

/* ⌨️ TELEKOMANDA */


function pauseAuto(){


auto=false;


setTimeout(()=>{


auto=true;


},7000);


}







document.addEventListener(

"keydown",

e=>{



if(!cards.length)

return;





pauseAuto();





cards.forEach(card=>{


card.classList.remove(

"tv-focus"

);


});






if(e.key==="ArrowDown"){



focus++;



if(focus>=cards.length){



focus=0;



}



}






if(e.key==="ArrowUp"){



focus--;



if(focus<0){



focus=cards.length-1;



}



}






cards[focus].classList.add(

"tv-focus"

);






cards[focus].scrollIntoView({


behavior:"smooth",


block:"center"


});



});







/* 📜 AUTO SCROLL PËR EKRAN TV */


(function autoScroll(){



if(

auto &&

wrap.scrollHeight > wrap.clientHeight

){



wrap.scrollTop++;





if(

wrap.scrollTop >=

wrap.scrollHeight - wrap.clientHeight

){



wrap.scrollTop=0;



}



}






requestAnimationFrame(

autoScroll

);



})();

/* 🚀 START PROGRAMI */


load();




/* 🔄 PËRDITËSIM ÇDO 60 SEKONDA */


setInterval(()=>{


load();


},60000);
