<!DOCTYPE html>
<html lang="sq"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Football Guide PRO TV</title>
<style>
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#07111b,#0d1723);color:#fff;font-family:Arial,sans-serif;overflow:hidden}
.header{height:72px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,#00c97d,#0099ff);font-size:28px;font-weight:900}
.wrap{height:calc(100vh - 72px);overflow:auto;padding:18px}
.match{background:linear-gradient(145deg,#162131,#0e151f);border-radius:20px;padding:20px;margin:16px 0;border:1px solid #2d3f56;transition:.25s;box-shadow:0 8px 20px rgba(0,0,0,.4)}
.tv-focus{transform:scale(1.04);border:2px solid #00ff99;box-shadow:0 0 18px #00ff99}
.league{color:#9cb2ca;margin-bottom:12px}.row{display:flex;justify-content:space-between;align-items:center}
.team{width:38%;display:flex;align-items:center;gap:10px;font-size:22px;font-weight:bold}.team img{width:52px;height:52px;border-radius:50%;background:#fff;padding:4px}
.center{text-align:center}.time{font-size:28px;color:#00ff99;font-weight:bold}.status{display:inline-block;margin-top:8px;padding:6px 16px;border-radius:20px;background:#ff304f}
</style></head><body>
<div class="header">⚽ FUTBOLLI SOT NË PLAY SHQIP</div>
<div class="wrap" id="games">Duke ngarkuar...</div>
<script>
const leagues=[4304,4328,4335,4332,4331,4334,4337,4338,4340,4341];
let all=[],cards=[],focus=0,autoScroll=true,resume;
const box=document.getElementById("games");
function fmt(d,t){if(!d||!t)return"--:--";return new Date(d+"T"+t+"Z").toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});}
async function load(){
box.innerHTML="Duke ngarkuar...";
all=[];
await Promise.all(leagues.map(async id=>{
try{
let r=await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id);
let j=await r.json(); if(j.events) all.push(...j.events);
}catch(e){}
}));
all.sort((a,b)=>(a.dateEvent+a.strTime).localeCompare(b.dateEvent+b.strTime));
render();
}
function render(){
if(!all.length){box.innerHTML="Nuk ka ndeshje.";return;}
box.innerHTML=all.map(ev=>`<div class="match">
<div class="league">🏆 ${ev.strLeague||"Football"}</div>
<div class="row">
<div class="team"><img src="${ev.strHomeTeamBadge||'https://via.placeholder.com/52'}">${ev.strHomeTeam||''}</div>
<div class="center"><div class="time">${fmt(ev.dateEvent,ev.strTime)}</div><div class="status">NEXT</div></div>
<div class="team" style="justify-content:flex-end">${ev.strAwayTeam||''}<img src="${ev.strAwayTeamBadge||'https://via.placeholder.com/52'}"></div>
</div></div>`).join("");
cards=[...document.querySelectorAll(".match")];
focus=0;if(cards[0])cards[0].classList.add("tv-focus");
}
function stop(){autoScroll=false;clearTimeout(resume);resume=setTimeout(()=>autoScroll=true,7000);}
document.addEventListener("keydown",e=>{
if(!cards.length)return;stop();cards.forEach(c=>c.classList.remove("tv-focus"));
if(e.key==="ArrowDown")focus=(focus+1)%cards.length;
if(e.key==="ArrowUp")focus=(focus-1+cards.length)%cards.length;
cards[focus].classList.add("tv-focus");
cards[focus].scrollIntoView({behavior:"smooth",block:"center"});
});
function loop(){
const w=document.querySelector(".wrap");
if(autoScroll&&w.scrollHeight>w.clientHeight){
w.scrollTop+=1;
if(w.scrollTop>=w.scrollHeight-w.clientHeight)w.scrollTop=0;
}
requestAnimationFrame(loop);
}
loop();load();setInterval(load,60000);
</script></body></html>
