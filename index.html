<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Guide</title>

<style>
body{
    margin:0;
    background:#121212;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.widget{
    width:650px;
    height:500px;
    background:#1e1e1e;
    border-radius:20px;
    padding:20px;
    overflow-y:auto;
    scrollbar-width:none;
}

.widget::-webkit-scrollbar{
    display:none;
}

h1{
    text-align:center;
    color:#00d26a;
}

.match{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
    border-bottom:1px solid #333;
}

.info{
    display:flex;
    flex-direction:column;
}

.teams{
    font-size:22px;
    font-weight:bold;
}

.date{
    color:#aaa;
    font-size:16px;
}

.time{
    color:#00d26a;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="widget" id="matches">

<h1>⚽ Football Guide</h1>

<div class="match">
    <div class="info">
        <div class="teams">Manchester City vs Arsenal</div>
        <div class="date">12 Korrik 2026</div>
    </div>
    <div class="time">18:30</div>
</div>

<div class="match">
    <div class="info">
        <div class="teams">Barcelona vs Real Madrid</div>
        <div class="date">13 Korrik 2026</div>
    </div>
    <div class="time">21:00</div>
</div>

<div class="match">
    <div class="info">
        <div class="teams">Bayern Munich vs Dortmund</div>
        <div class="date">14 Korrik 2026</div>
    </div>
    <div class="time">20:30</div>
</div>

<div class="match">
    <div class="info">
        <div class="teams">Liverpool vs Chelsea</div>
        <div class="date">15 Korrik 2026</div>
    </div>
    <div class="time">19:45</div>
</div>

<div class="match">
    <div class="info">
        <div class="teams">Juventus vs Milan</div>
        <div class="date">16 Korrik 2026</div>
    </div>
    <div class="time">20:45</div>
</div>

</div>

<script>
const box = document.getElementById("matches");

let dir = 1;

setInterval(() => {
    box.scrollTop += dir;

    if (box.scrollTop + box.clientHeight >= box.scrollHeight)
        dir = -1;

    if (box.scrollTop <= 0)
        dir = 1;
}, 30);
</script>

</body>
</html>
