<!DOCTYPE html>
<html lang="sq">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Play Shqip - Futboll Ditor</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#070a0f;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}


.header{
height:70px;
background:#0d0000;
border-bottom:2px solid #e10600;
display:flex;
align-items:center;
justify-content:center;
}


.logo{
display:flex;
align-items:center;
gap:12px;
font-weight:900;
}


.play-logo{
width:45px;
height:45px;
object-fit:contain;
border-radius:50%;
}


.logo span{
font-size:28px;
color:white;
}


.logo small{
display:block;
font-size:12px;
color:white;
}



.wrap{
height:calc(100vh - 70px);
overflow:auto;
padding:18px;
}



.match{

background:linear-gradient(145deg,#1a0808,#0d0303);

border:1px solid #3a1414;

border-radius:20px;

padding:18px;

margin-bottom:16px;

box-shadow:0 6px 18px rgba(0,0,0,.7);

}



.tv-focus{

border:2px solid #e10600;

transform:scale(1.03);

box-shadow:0 0 18px rgba(225,6,0,.6);

}



.league{

color:#c9979b;

font-size:14px;

margin-bottom:10px;

}



.row{

display:flex;

align-items:center;

justify-content:space-between;

}



.team{

width:38%;

display:flex;

align-items:center;

gap:10px;

font-size:21px;

font-weight:bold;

}



.team img{

width:50px;

height:50px;

border-radius:50%;

background:#fff;

padding:3px;

}



.center{

text-align:center;

}



.time{

font-size:18px;

color:#e10600;

font-weight:bold;

}



.channel{

display:flex;

align-items:center;

justify-content:center;

gap:8px;

margin-top:10px;

font-size:13px;

font-weight:bold;

color:white;

}



.channel img{

width:40px;

height:35px;

object-fit:contain;

border-radius:8px;

background:white;

padding:3px;

}



.status{

display:inline-block;

margin-top:8px;

background:#7a0000;

color:#fff;

padding:6px 14px;

border-radius:20px;

font-size:12px;

border:1px solid #e10600;

}


</style>

</head>


<body>
<div class="header">

<div class="logo">

<img class="play-logo"
src="https://i.ibb.co/Kpd6bW8X/logo-256.png">

<div>

<span>
PLAY SHQIP
</span>

<small>
FUTBOLL GUIDE
</small>

</div>

</div>

</div>



<div class="wrap" id="games">

Duke ngarkuar...

</div>



<script>


/* ==========================
   LIGAT ME TRANSMETIM SHQIP/KOSOVË
========================== */


const leagues=[


/* 🌍 BOTËROR */

4429,
5518,



/* 🏆 UEFA KLUBE */

4304,
4480,
4481,



/* 🏴 ANGLI */

4328,



/* 🇮🇹 ITALI */

4332,



/* 🇪🇸 SPANJE */

4335,



/* 🇩🇪 GJERMANI */

4331,



/* 🇫🇷 FRANCË */

4334,



/* 🇹🇷 TURQI */

4341,



/* 🇵🇹 PORTUGALI */

4338,



/* 🇦🇱 SHQIPËRI */

4907,



/* 🇽🇰 KOSOVË */

4968,



/* 🏆 KUPA */

4482,
4483,
4484,
4502


];



let cards=[];

let focus=0;

let auto=true;



const wrap=document.querySelector(".wrap");

const games=document.getElementById("games");



/* ORA */

function fmt(d,t){


if(!d || !t)

return "--:--";


return new Date(

d+"T"+t+"Z"

)

.toLocaleTimeString(

"sq-AL",

{

hour:"2-digit",

minute:"2-digit",

hour12:false

}

);


}



/* DATA */

function fmtDate(d){


if(!d)

return "";


let date=new Date(d);


let months=[

"Janar",
"Shkurt",
"Mars",
"Prill",
"Maj",
"Qershor",
"Korrik",
"Gusht",
"Shtator",
"Tetor",
"Nëntor",
"Dhjetor"

];


return date.getDate()

.toString()

.padStart(2,"0")

+" "

+months[date.getMonth()]

+" "

+date.getFullYear();


}



const tvIcon="📺";
const channelLogos={


"Super Sport Albania":

"https://www.thesportsdb.com/images/icons/svg/flags/albania.svg",



"Tring Sport Albania":

"https://www.thesportsdb.com/images/icons/svg/flags/albania.svg",



"Art Sport Kosova":

"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Flag_of_Kosovo.svg/250px-Flag_of_Kosovo.svg.png",



"RTSH Sport Albania":

"https://www.thesportsdb.com/images/icons/svg/flags/albania.svg"


};





/* 🇦🇱 KANALET SHQIPTARE/KOSOVARE */


const albanianBroadcast={



/* 🌍 BOTËROR */

"World Cup":[

"Super Sport Albania"

],


"World Cup Qualifiers":[

"Super Sport Albania"

],


"Euro":[

"Super Sport Albania"

],


"UEFA Nations League":[

"Super Sport Albania"

],




/* 🏆 UEFA */

"Champions League":[

"Tring Sport Albania",
"Art Sport Kosova"

],


"UEFA Champions League":[

"Tring Sport Albania",
"Art Sport Kosova"

],



"Europa League":[

"Super Sport Albania",
"Art Sport Kosova"

],


"UEFA Europa League":[

"Super Sport Albania",
"Art Sport Kosova"

],



"Europa Conference League":[

"Super Sport Albania",
"Art Sport Kosova"

],


"UEFA Europa Conference League":[

"Super Sport Albania",
"Art Sport Kosova"

],




/* 🏴 ANGLI */

"Premier League":[

"Super Sport Albania",
"Art Sport Kosova"

],




/* 🇪🇸 SPANJË */

"La Liga":[

"Super Sport Albania",
"Art Sport Kosova"

],




/* 🇮🇹 ITALI */

"Serie A":[

"Tring Sport Albania",
"Art Sport Kosova"

],


"Coppa Italia":[

"Tring Sport Albania"

],




/* 🇩🇪 GJERMANI */

"Bundesliga":[

"Super Sport Albania"

],




/* 🇫🇷 FRANCË */

"Ligue 1":[

"Super Sport Albania"

],




/* 🇹🇷 TURQI */

"Super Lig Turkey":[

"Super Sport Albania"

],


"Turkish Super Lig":[

"Super Sport Albania"

],




/* 🇵🇹 PORTUGALI */

"Primeira Liga":[

"Tring Sport Albania"

],




/* 🇦🇱 SHQIPËRI */

"Albania":[

"RTSH Sport Albania"

],


"Albanian":[

"RTSH Sport Albania"

],


"Superliga":[

"RTSH Sport Albania"

],


"Kategoria Superiore":[

"RTSH Sport Albania"

],




/* 🇽🇰 KOSOVË */

"Kosovo":[

"Art Sport Kosova"

],


"Kosovar":[

"Art Sport Kosova"

]


};
function getChannels(league){


let channels=[];


league=league || "";



Object.keys(albanianBroadcast)

.forEach(key=>{


if(league.includes(key)){


channels.push(

...albanianBroadcast[key]

);


}


});



return [

...new Set(channels)

];


}





/* 📺 SHFAQJA E KANALEVE ME LOGO */

function renderChannels(list){


if(!list.length)

return "";



return list.map(ch=>`


<div class="channel">


<img src="${channelLogos[ch]}" alt="${ch}">


<span>${ch}</span>


</div>


`).join("");


}





/* 🔄 NGARKIMI NGA API */

async function load(){


const now=new Date();



const today=

now.getFullYear()

+"-"

+String(now.getMonth()+1).padStart(2,"0")

+"-"

+String(now.getDate()).padStart(2,"0");



let all=[];



await Promise.all(



leagues.map(async(id)=>{


try{



const r=await fetch(

"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id

);



const j=await r.json();



if(j.events){



j.events.forEach(ev=>{



const eventDate=new Date(ev.dateEvent);

const todayDate=new Date(today);



const diffDays=(

eventDate-todayDate

)/(1000*60*60*24);





/* vetëm 7 ditët e ardhshme */

if(diffDays>=0 && diffDays<=7){



let channels=getChannels(

ev.strLeague

);



/* fut vetëm ato që kanë kanal shqiptar/kosovar */

if(channels.length){


all.push(ev);


}



}



});



}



}catch(e){


console.log(

"Gabim liga",

id

);


}



})


);




/* HEQ DUBLIMET */

all=[


...new Map(


all.map(ev=>[

ev.idEvent,

ev

])


).values()


];




/* RENDIT SIPAS ORËS */

all.sort((a,b)=>{


let da=new Date(

`${a.dateEvent}T${a.strTime || "00:00:00"}Z`

);



let db=new Date(

`${b.dateEvent}T${b.strTime || "00:00:00"}Z`

);



return da-db;


});




let html=[];



all.forEach(ev=>{


html.push(

createMatchCard(ev)

);


});



games.innerHTML = html.length ?


html.join("")



:


`

<div style="

text-align:center;

padding:30px;

font-size:18px;

color:#ccc;

">

🔄 Stafi i play shqip po përditëson eventet futbollistike provojeni pas pak...

</div>

`;




cards=[

...document.querySelectorAll(".match")

];



focus=0;



if(cards[0]){


cards[0].classList.add("tv-focus");


}



}
function createMatchCard(ev){


let channels=getChannels(

ev.strLeague

);



let tvHTML=renderChannels(

channels

);



return `


<div class="match">



<div class="league">

🏆 ${ev.strLeague || "Futboll"}

</div>





<div class="row">





<div class="team">


<img src="${

ev.strHomeTeamBadge ||

'https://via.placeholder.com/50'

}">


${ev.strHomeTeam || ""}


</div>







<div class="center">





<div class="time">


📅 ${fmtDate(ev.dateEvent)}


<br>


⏰ ${fmt(

ev.dateEvent,

ev.strTime

)}


</div>






<span style="

display:block;

margin-top:8px;

color:white;

font-size:14px;

font-weight:bold;

letter-spacing:1px;

">




</span>





${tvHTML}





<div class="status">


Transmetim LIVE


</div>





</div>








<div class="team" style="justify-content:flex-end">


${ev.strAwayTeam || ""}



<img src="${

ev.strAwayTeamBadge ||

'https://via.placeholder.com/50'

}">


</div>







</div>



</div>


`;



}







/* ⌨️ TELEKOMANDA */


function pauseAuto(){


auto=false;



setTimeout(()=>{


auto=true;


},7000);



}





document.addEventListener(

"keydown",

e=>{


if(!cards.length)

return;



pauseAuto();





cards.forEach(card=>{


card.classList.remove(

"tv-focus"

);


});





if(e.key==="ArrowDown"){


focus++;



if(focus>=cards.length){


focus=0;


}



}





if(e.key==="ArrowUp"){


focus--;



if(focus<0){


focus=cards.length-1;


}



}





cards[focus].classList.add(

"tv-focus"

);






cards[focus].scrollIntoView({


behavior:"smooth",


block:"center"


});


});




/* 📜 AUTO SCROLL PËR TV */


(function autoScroll(){



if(

auto &&

wrap.scrollHeight > wrap.clientHeight

){



wrap.scrollTop++;





if(

wrap.scrollTop >=

wrap.scrollHeight - wrap.clientHeight

){



wrap.scrollTop=0;



}



}



requestAnimationFrame(

autoScroll

);



})();






/* 🚀 START */

load();






/* 🔄 PËRDITËSIM ÇDO 60 SEKONDA */


setInterval(()=>{


load();


},60000);




</script>


</body>


</html>
