<!DOCTYPE html>
<html lang="sq">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPORT TV</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
overflow:hidden;

}


.header{

height:90px;
background:#111;
text-align:center;
font-size:45px;
font-weight:bold;
padding:20px;

}


#status{

text-align:center;
font-size:25px;
padding:10px;

}



.scrollbox{

height:calc(100vh - 100px);
overflow:hidden;

}



.container{

width:98%;
margin:auto;

}



.card{

width:100%;
background:#151515;
margin:25px 0;
padding:35px;
border-radius:25px;
text-align:center;

}



.league{

font-size:36px;
font-weight:bold;
color:#ffcc00;
margin-bottom:20px;

}



.time{

font-size:32px;
margin-bottom:25px;

}



.teams{

display:flex;
justify-content:space-around;
align-items:center;
width:100%;

}



.team{

width:35%;
font-size:32px;
font-weight:bold;
text-align:center;

}



.logo{

width:130px;
height:130px;
object-fit:contain;
margin-bottom:15px;

}



.vs{

font-size:45px;
font-weight:bold;
color:#ff3333;

}



</style>

</head>


<body>


<div class="header">

⚽ SPORT TV

</div>



<div id="status">

Duke ngarkuar...

</div>



<div class="scrollbox" id="scrollbox">

<div class="container" id="matches">

</div>

</div>



<script>


async function loadMatches(){


try{


let today =
new Date().toISOString().slice(0,10);



let url =
"https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d="
+today+"&s=Soccer";



let response =
await fetch(url);



let data =
await response.json();



let box =
document.getElementById("matches");

box.innerHTML="";



if(!data.events){


box.innerHTML =
"<h2>Nuk ka ndeshje sot</h2>";

return;


}



data.events.forEach(game=>{


box.innerHTML += `


<div class="card">


<div class="league">

${game.strLeague || "Liga"}

</div>



<div class="time">

${game.strTime ? game.strTime.substring(0,5) : "--:--"}

</div>




<div class="teams">


<div class="team">

<img class="logo"
src="${game.strHomeTeamBadge || ''}">

<br>

${game.strHomeTeam}


</div>




<div class="vs">

VS

</div>




<div class="team">

<img class="logo"
src="${game.strAwayTeamBadge || ''}">

<br>

${game.strAwayTeam}


</div>



</div>


</div>


`;

});


document.getElementById("status").innerHTML="";


}


catch(error){

document.getElementById("status").innerHTML=
"Gabim interneti";

}


}





/* AUTO SCROLL ANDROID TV */

let pos=0;

let speed=1;



function autoScroll(){


let box=document.getElementById("scrollbox");


pos += speed;


box.scrollTop=pos;



if(pos >= box.scrollHeight-box.clientHeight){


setTimeout(()=>{

pos=0;
box.scrollTop=0;

},3000);


}



requestAnimationFrame(autoScroll);


}



loadMatches();


setTimeout(()=>{

autoScroll();

},5000);



setInterval(()=>{

loadMatches();

},300000);



</script>


</body>

</html>
