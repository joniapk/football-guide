<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Football TV</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
background:#05070b;
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
}


.app{
display:flex;
height:100vh;
}


/* MENU */

.sidebar{
width:260px;
background:#0c1118;
padding:25px 15px;
}


.logo{
font-size:28px;
font-weight:900;
color:#00ff99;
margin-bottom:35px;
}


.menu{
padding:15px;
margin-bottom:10px;
border-radius:12px;
font-size:20px;
color:#aeb8c5;
}


.menu.focus-menu{
background:#00ff99;
color:#000;
transform:scale(1.05);
font-weight:bold;
}



/* MAIN */

.main{
flex:1;
padding:25px;
}


.header{
display:flex;
justify-content:space-between;
align-items:center;
}


.title{
font-size:34px;
font-weight:bold;
}


.clock{
font-size:28px;
color:#00ff99;
}



h2{
color:#00ff99;
}


.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}


.card{

height:170px;
background:#111923;
border-radius:18px;
padding:18px;

border:2px solid transparent;

display:flex;
flex-direction:column;
justify-content:space-between;

}


.card.focus{

border-color:#00ff99;
transform:scale(1.06);
box-shadow:0 0 25px #00ff9955;

}


.live{

background:#e60000;
padding:6px 12px;
border-radius:20px;
width:max-content;

}


.teams{

display:flex;
justify-content:center;
align-items:center;
gap:15px;

font-size:21px;
font-weight:bold;

}


.league{

color:#9aa7b8;

}


.time{

color:#00ff99;
font-size:20px;
}



/* PLAYER PAGE */


.player-page{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100vh;

background:#05070b;

z-index:20;

}



.player-header{

height:75px;

background:#0c1118;

border-bottom:2px solid #00ff99;

display:flex;

align-items:center;

padding-left:30px;

font-size:28px;

font-weight:bold;

color:#00ff99;

}



.player-box{

height:75%;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

font-size:35px;

}



.play{

width:100px;
height:100px;

background:#00ff99;

color:#000;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:45px;

margin-bottom:30px;

}



.back{

text-align:center;

font-size:22px;

color:#aaa;

}


</style>

</head>


<body>



<div class="app">


<div class="sidebar">


<div class="logo">
⚽ FOOTBALL TV
</div>


<div class="menu focus-menu">
🏠 Home
</div>

<div class="menu">
🔴 Live
</div>

<div class="menu">
🏆 Champions League
</div>

<div class="menu">
🇬🇧 Premier League
</div>

<div class="menu">
🇪🇸 La Liga
</div>

<div class="menu">
🇮🇹 Serie A
</div>


</div>



<div class="main">


<div class="header">

<div class="title">
Football Live
</div>

<div class="clock" id="clock">
00:00
</div>

</div>


<h2>🔴 LIVE MATCHES</h2>


<div class="grid">


<div class="card">

<div class="live">
LIVE
</div>

<div class="teams">
Arsenal VS Chelsea
</div>

<div class="league">
Premier League
</div>

</div>



<div class="card">

<div class="time">
20:45
</div>

<div class="teams">
Real Madrid VS Barcelona
</div>

<div class="league">
La Liga
</div>

</div>



<div class="card">

<div class="time">
21:00
</div>

<div class="teams">
Inter VS Milan
</div>

<div class="league">
Serie A
</div>

</div>


</div>


</div>

</div>




<!-- PLAYER -->

<div class="player-page" id="playerPage">


<div class="player-header">
⚽ FOOTBALL TV PLAYER
</div>


<div class="player-box">


<div class="play">
▶
</div>


<div id="matchName">
Ndeshja
</div>


</div>


<div class="back">
BACK për kthim
</div>


</div>





<script>


function clock(){

let d=new Date();

document.getElementById("clock").innerHTML=
d.toLocaleTimeString("sq-AL",
{
hour:"2-digit",
minute:"2-digit"
});

}

setInterval(clock,1000);
clock();



let menu=document.querySelectorAll(".menu");

let cards=document.querySelectorAll(".card");


let menuPos=0;
let cardPos=0;

let mode="menu";



function menuUpdate(){

menu.forEach(x=>x.classList.remove("focus-menu"));

menu[menuPos].classList.add("focus-menu");

}



function cardUpdate(){

cards.forEach(x=>x.classList.remove("focus"));

cards[cardPos].classList.add("focus");

}




document.addEventListener("keydown",e=>{


if(mode==="menu"){


if(e.key==="ArrowDown"){

menuPos++;

if(menuPos>=menu.length)
menuPos=0;

menuUpdate();

}


if(e.key==="ArrowUp"){

menuPos--;

if(menuPos<0)
menuPos=menu.length-1;

menuUpdate();

}


if(e.key==="ArrowRight"){

mode="cards";

cardUpdate();

}


}



else{


if(e.key==="ArrowRight" || e.key==="ArrowDown"){

cardPos++;

if(cardPos>=cards.length)
cardPos=0;

cardUpdate();

}



if(e.key==="ArrowLeft"){

mode="menu";

menuUpdate();

}



if(e.key==="Enter"){


document.getElementById("playerPage").style.display="block";


document.getElementById("matchName").innerHTML=
cards[cardPos].innerText;


}



}



if(e.key==="Escape" || e.key==="Backspace"){


document.getElementById("playerPage").style.display="none";

}


});


</script>


</body>
</html>
