<!DOCTYPE html>
<html lang="sq"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Football Guide PRO TV</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#070a0f;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
.header{height:70px;background:#10151d;border-bottom:2px solid #00ff99;color:#00ff99;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900}
.wrap{height:calc(100vh - 70px);overflow:auto;padding:18px}
.date-header{background:#00ff99;color:#000;padding:10px;border-radius:12px;margin:18px 0 10px;font-weight:bold;text-align:center}
.match{background:linear-gradient(145deg,#18212c,#0d131b);border:1px solid #263242;border-radius:20px;padding:18px;margin-bottom:16px;transition:.25s;box-shadow:0 6px 18px rgba(0,0,0,.5)}
.tv-focus{
transform:none;
border:1px solid #263242;
border-left:6px solid #00ff99;
background:linear-gradient(145deg,#1b2632,#111821);
box-shadow:0 0 12px rgba(0,255,153,.25);
}
.league{color:#95a6bb;font-size:14px;margin-bottom:10px}
.row{display:flex;align-items:center;justify-content:space-between}
.team{
width:34%;
display:flex;
align-items:center;
gap:10px;
font-size:21px;
font-weight:bold;
}
.team img{width:50px;height:50px;border-radius:50%;background:#fff;padding:3px}
.center{
text-align:center;
padding:12px;
border-radius:14px;
transition:.3s;
}

.time{
font-size:18px;
color:#00ff99;
font-weight:bold;
}

.status{
display:inline-block;
margin-top:8px;
background:#ff1744;
padding:6px 14px;
border-radius:20px;
font-size:12px;
}
.logo{display:flex;align-items:center;gap:10px;font-weight:900}.logo span{font-size:28px;color:#00ff99}.logo small{font-size:12px;color:#fff;display:block}
</style></head><body>
<div class="header"><div class="logo">⚽<span>PLAY SHQIP</span><small>FUTBOLL GUIDE</small></div></div>
<div class="wrap" id="games">Duke ngarkuar...</div>
<script>
const leagues=[4328,4332,4335,4331,4334,4304,4337,4338,4340,4341];
const fmt=(d,t)=>new Date(d+"T"+t+"Z").toLocaleTimeString("sq-AL",{hour:"2-digit",minute:"2-digit",hour12:false});
const fmtDate=d=>new Date(d).toLocaleDateString("sq-AL",{day:"2-digit",month:"long",year:"numeric"});
let cards=[],focus=0,auto=true,timer;
const wrap=document.querySelector('.wrap');
async function load(){
let all=[];
await Promise.all(leagues.map(async id=>{
try{let r=await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id);let j=await r.json();if(j.events)all.push(...j.events);}catch(e){}
}));
all.sort((a,b)=>(a.dateEvent+a.strTime).localeCompare(b.dateEvent+b.strTime));
let last="";
let out="";
all.forEach(ev=>{
if (ev.dateEvent !== last) {
    last = ev.dateEvent;
    out += `<div class="date-header">📅 ${fmtDate(ev.dateEvent)}</div>`;
}

out += `<div class="match">
<div class="league">🏆 ${ev.strLeague || ""}</div>
<div class="row">
<div class="team">
<img src="${ev.strHomeTeamBadge || 'https://via.placeholder.com/50'}">
${ev.strHomeTeam || ""}
</div>

<div class="center">
<div class="time">⏰ ${fmt(ev.dateEvent, ev.strTime)}</div>
<div class="status">SË SHPEJTI</div>
</div>

<div class="team" style="justify-content:flex-end">
${ev.strAwayTeam || ""}
<img src="${ev.strAwayTeamBadge || 'https://via.placeholder.com/50'}">
</div>
</div>
</div>`;
 out+=`<div class="match"><div class="league">🏆 ${ev.strLeague||""}</div><div class="row"><div class="team"><img src="${ev.strHomeTeamBadge||'https://via.placeholder.com/50'}">${ev.strHomeTeam||""}</div><div class="center"><div class="time">⏰ ${fmt(ev.dateEvent,ev.strTime)}</div><div class="status">SË SHPEJTI</div></div><div class="team" style="justify-content:flex-end">${ev.strAwayTeam||""}<img src="${ev.strAwayTeamBadge||'https://via.placeholder.com/50'}"></div></div></div>`;
});
games.innerHTML=out||"Nuk ka ndeshje";
cards=[...document.querySelectorAll(".center")];focus=0;if(cards[0])cards[0].classList.add("tv-focus");
}

function pause(){auto=false;clearTimeout(timer);timer=setTimeout(()=>auto=true,7000);}
document.addEventListener("keydown",e=>{
if(!cards.length)return;
pause();
cards.forEach(c=>c.classList.remove("tv-focus"));
if(e.key==="ArrowDown")focus=(focus+1)%cards.length;
if(e.key==="ArrowUp")focus=(focus-1+cards.length)%cards.length;
cards[focus].classList.add("tv-focus");
cards[focus].scrollIntoView({behavior:"smooth",block:"center"});
});
setInterval(() => {
    if (!auto) return;

    if (wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight) {
        setTimeout(() => {
            wrap.scrollTop = 0;
        }, 3000);
    } else {
        wrap.scrollTop += 2;
    }
}, 30);

load();setInterval(load,60000);
</script></body></html>
