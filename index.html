<!DOCTYPE html>
<html lang="sq">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Play Shqip</title>

<style>

body{
margin:0;
background:#050505;
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
}


.header{

height:60px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
font-size:28px;
font-weight:bold;

}


.my-logo{

width:45px;
height:45px;
border-radius:50%;
object-fit:contain;

}



.scrollbox{

height:calc(100vh - 60px);
overflow:hidden;

}



.container{

width:94%;
margin:auto;

}



.card{

background:#161616;
margin:18px 0;
padding:22px;
border-radius:15px;
border:1px solid #333;

}



.league{

text-align:center;
font-size:28px;
font-weight:bold;
color:#ffcc00;
margin-bottom:15px;

}



.match{

display:flex;
align-items:center;
justify-content:space-between;

}



.team{

width:35%;
display:flex;
align-items:center;
gap:15px;
font-size:28px;
font-weight:bold;

}



.team.right{

justify-content:flex-end;
text-align:right;

}



.logo{

width:70px;
height:70px;
object-fit:contain;

}



.time{

width:20%;
text-align:center;
font-size:32px;
font-weight:bold;

}


</style>

</head>


<body>


<div class="header">

<img class="my-logo" src="https://i.ibb.co/yFqp6q5M/Picsart-26-01-16-13-29-42-063.png">

<span>
Play Shqip
</span>

</div>



<div class="scrollbox" id="scrollbox">

<div class="container" id="matches">

</div>

</div>




<script>


async function loadMatches(){


try{


let date =
new Date().toISOString().slice(0,10);



let url =
"https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d="
+date+"&s=Soccer";



let res =
await fetch(url);



let data =
await res.json();



let box =
document.getElementById("matches");

box.innerHTML="";



if(!data.events){

box.innerHTML="<h2>Nuk ka ndeshje sot</h2>";

return;

}



data.events.forEach(game=>{


box.innerHTML += `


<div class="card">


<div class="league">

${game.strLeague || "Liga"}

</div>



<div class="match">


<div class="team">


<img class="logo"
src="${game.strHomeTeamBadge || ''}">


<span>
${game.strHomeTeam}
</span>


</div>



<div class="time">

${game.strTime ? game.strTime.substring(0,5) : "--:--"}

</div>




<div class="team right">


<span>
${game.strAwayTeam}
</span>


<img class="logo"
src="${game.strAwayTeamBadge || ''}">


</div>



</div>


</div>


`;

});


}


catch(e){

document.getElementById("matches").innerHTML =
"Gabim interneti";

}


}





/* AUTO SCROLL */

let pos=0;
let speed=1;
let running=true;



function autoScroll(){


let box=document.getElementById("scrollbox");


if(running){

pos += speed;

box.scrollTop=pos;



if(pos >= box.scrollHeight-box.clientHeight){


setTimeout(()=>{

pos=0;
box.scrollTop=0;

},3000);


}


}


requestAnimationFrame(autoScroll);


}





/* TELEKOMANDA */

document.addEventListener("keydown",function(e){


let box=document.getElementById("scrollbox");



if(e.key==="ArrowDown"){

running=false;
box.scrollTop += 150;

}



if(e.key==="ArrowUp"){

running=false;
box.scrollTop -= 150;

}



if(e.key==="Enter"){

running=!running;

}



});




loadMatches();


setTimeout(()=>{

autoScroll();

},4000);



setInterval(()=>{

loadMatches();

},300000);



</script>


</body>
</html>
