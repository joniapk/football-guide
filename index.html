<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football Guide PRO TV</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#070a0f;
color:white;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}


.header{

height:70px;

display:flex;
align-items:center;
justify-content:center;

background:#10151d;

color:#00ff99;

font-size:26px;

font-weight:900;

border-bottom:2px solid #00ff99;

}



.wrap{

height:calc(100vh - 70px);

padding:20px;

overflow-y:auto;

overflow-x:hidden;

}



.match{

background:linear-gradient(135deg,#151b25,#0e131b);

margin-bottom:15px;

padding:20px;

border-radius:18px;

border:1px solid #263242;

box-shadow:0 5px 20px #000;

transition:.3s;

}



.tv-focus{

border:3px solid #00ff99;

transform:scale(1.04);

}




.league{

color:#8d99aa;

font-size:14px;

margin-bottom:12px;

}



.row{

display:flex;

align-items:center;

justify-content:space-between;

}



.team{

width:38%;

display:flex;

align-items:center;

gap:12px;

font-size:22px;

font-weight:bold;

}



.team img{

width:45px;

height:45px;

border-radius:50%;

background:white;

padding:3px;

object-fit:contain;

}



.center{

width:24%;

text-align:center;

}



.time{

color:#00ff99;

font-size:24px;

font-weight:bold;

}



.status{

background:#ff0033;

display:inline-block;

padding:5px 12px;

border-radius:20px;

font-size:12px;

margin-top:8px;

font-weight:bold;

}



::-webkit-scrollbar{

width:6px;

}

::-webkit-scrollbar-thumb{

background:#00ff99;

border-radius:10px;

}


</style>

</head>


<body>


<div class="header">

⚽ FUTBOLLI SOT NË PLAY SHQIP

</div>



<div class="wrap" id="games">

Duke ngarkuar ndeshjet...

</div>



<script>


const leagues=[

4304,
4328,
4335,
4332,
4331,
4334,
4337,
4338,
4340,
4341

];


let all=[];


let cards=[];

let focus=0;


let autoScroll=true;



function formatTime(date,time){

if(!date || !time)

return "--:--";


let d=new Date(date+"T"+time+":00Z");


return d.toLocaleTimeString([],{

hour:"2-digit",

minute:"2-digit"

});

}



async function load(){


all=[];


for(let id of leagues){


try{


let r=await fetch(

"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id

);


let d=await r.json();



if(d.events)

all.push(...d.events);



}catch(e){}



}


render();


}



function render(){


let box=document.getElementById("games");



if(!all.length){

box.innerHTML="⚠️ Nuk ka ndeshje";

return;

}



box.innerHTML=all.map(ev=>`


<div class="match">


<div class="league">

🏆 ${ev.strLeague || "Football"}

</div>



<div class="row">


<div class="team">

<img src="${ev.strHomeTeamBadge || 'https://via.placeholder.com/45'}">

${ev.strHomeTeam || ""}

</div>



<div class="center">

<div class="time">

⏰ ${formatTime(ev.dateEvent,ev.strTime)}

</div>


<div class="status">

NEXT

</div>


</div>



<div class="team" style="justify-content:flex-end">

${ev.strAwayTeam || ""}

<img src="${ev.strAwayTeamBadge || 'https://via.placeholder.com/45'}">

</div>


</div>


</div>


`).join("");



startRemote();


}



/* ANDROID TV REMOTE */


function startRemote(){


cards=[...document.querySelectorAll(".match")];


focus=0;


if(cards[0])

cards[0].classList.add("tv-focus");


}



document.addEventListener("keydown",e=>{


autoScroll=false;


cards.forEach(c=>c.classList.remove("tv-focus"));



if(e.key==="ArrowDown")

focus++;


if(e.key==="ArrowUp")

focus--;


if(focus<0)

focus=cards.length-1;


if(focus>=cards.length)

focus=0;



if(cards[focus]){


cards[focus].classList.add("tv-focus");


cards[focus].scrollIntoView({

behavior:"smooth",

block:"center"

});


}



setTimeout(()=>{

autoScroll=true;

},5000);



});





/* ANDROID TV AUTO SCROLL */


function autoScrollTV(){


let box=document.querySelector(".wrap");


if(autoScroll){


box.scrollTop += 1;



if(box.scrollTop + box.clientHeight >= box.scrollHeight){


box.scrollTop=0;


}


}



setTimeout(autoScrollTV,40);



}


autoScrollTV();





load();


setInterval(load,60000);



</script>


</body>

</html>
