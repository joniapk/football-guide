<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Guide PRO</title>

<style>
body{
  margin:0;
  background:#0a0c10;
  color:white;
  font-family:Arial;
}

.header{
  background:#11151c;
  padding:16px;
  text-align:center;
  font-size:20px;
  font-weight:900;
  border-bottom:1px solid #1f2a3a;
}

/* SCROLL AREA */
.wrap{
  max-width:900px;
  margin:auto;
  padding:10px;

  height: calc(100vh - 70px);
  overflow-y: auto;
  scroll-behavior: smooth;
}

.match{
  background:#151a22;
  margin:10px 0;
  padding:15px;
  border-left:5px solid #ff3b3b;
  border-radius:8px;
  transition:0.2s;
}

.match:hover{
  transform:scale(1.01);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.team{
  display:flex;
  align-items:center;
  gap:8px;
  width:40%;
}

.team img{
  width:28px;
  height:28px;
  border-radius:50%;
}

.center{
  width:20%;
  text-align:center;
  font-weight:bold;
}

.league{
  font-size:12px;
  color:#9aa4b2;
  margin-bottom:6px;
}

.time{
  font-size:13px;
  color:#c1c7d0;
  margin-top:6px;
}
</style>

</head>

<body>

<div class="header">⚽ FUTBOLLI SOT NË PLAY SHQIP</div>

<div class="wrap" id="games">Loading...</div>

<script>

/* 🇦🇱 FIRST + EUROPE */
const leagues = [
  4304, // 🇦🇱 Kategoria Superiore FIRST
  4328, // Premier League
  4335, // La Liga
  4332, // Serie A
  4331, // Bundesliga
  4334, // Ligue 1
  4337, // Eredivisie
  4338, // Portugal
  4340, // Turkey
  4341  // Scotland
];

let all=[];

/* AUTO TIME */
function formatLocalTime(date, time){
  if(!date || !time) return "";
  let utcDate = new Date(date + "T" + time + ":00Z");
  return utcDate.toLocaleString([], {
    hour: "2-digit",
    minute: "2-digit"
  });
}

/* LOAD */
async function load(){

  all=[];

  for(let id of leagues){
    try{
      let r = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id);
      let d = await r.json();

      if(d && d.events && Array.isArray(d.events)){
        all.push(...d.events);
      }

    }catch(e){}
  }

  render();
}

/* RENDER */
function render(){

  if(all.length === 0){
    document.getElementById("games").innerHTML =
      "⚠️ No matches available";
    return;
  }

  document.getElementById("games").innerHTML =
  all.map(ev=>`
    <div class="match">

      <div class="league">${ev.strLeague || ""}</div>

      <div class="row">

        <div class="team">
          <img src="${ev.strHomeTeamBadge || 'https://via.placeholder.com/28'}">
          <div>${ev.strHomeTeam || ""}</div>
        </div>

        <div class="center">VS</div>

        <div class="team" style="justify-content:flex-end;">
          <div>${ev.strAwayTeam || ""}</div>
          <img src="${ev.strAwayTeamBadge || 'https://via.placeholder.com/28'}">
        </div>

      </div>

      <div class="time">
        ⏰ ${formatLocalTime(ev.dateEvent, ev.strTime)}
      </div>

    </div>
  `).join("");
}

/* AUTO SCROLL */
setInterval(() => {
  let el = document.querySelector(".wrap");

  el.scrollBy({ top: 120, behavior: "smooth" });

  if(el.scrollTop + el.clientHeight >= el.scrollHeight){
    el.scrollTo({ top: 0, behavior: "smooth" });
  }
}, 4000);

/* INIT */
load();
setInterval(load,60000);

</script>

</body>
</html>
