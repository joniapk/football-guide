<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Guide PRO TV</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Arial, sans-serif;
}

body{
 background:#050505;
 color:white;
 overflow:hidden;
}

.app{
 display:flex;
 height:100vh;
}

/* MENU */
.sidebar{
 width:260px;
 background:#0d0d0d;
 padding:30px;
 border-right:1px solid #222;
}

.logo{
 font-size:28px;
 font-weight:bold;
 color:#00ff88;
 margin-bottom:40px;
}

.menu div{
 padding:18px;
 margin-bottom:10px;
 border-radius:12px;
 font-size:20px;
}

.menu .active,
.menu div:hover{
 background:#00ff88;
 color:black;
}


/* CONTENT */
.content{
 flex:1;
 padding:35px;
}

.hero{
 height:230px;
 border-radius:25px;
 padding:40px;
 background:
 linear-gradient(90deg,#000,transparent),
 url("https://images.unsplash.com/photo-1579952363873-27f3bade9f55");
 background-size:cover;
}

.hero h1{
 font-size:45px;
}

.live{
 margin-top:30px;
}

.title{
 font-size:28px;
 margin-bottom:20px;
 color:#00ff88;
}


.cards{
 display:flex;
 gap:20px;
}


.card{
 width:260px;
 background:#151515;
 border-radius:20px;
 padding:20px;
 border:2px solid transparent;
}

.card:hover{
 border-color:#00ff88;
 transform:scale(1.05);
}

.team{
 display:flex;
 justify-content:space-between;
 font-size:22px;
 margin:15px 0;
}

.score{
 text-align:center;
 font-size:35px;
 font-weight:bold;
}

.livebadge{
 color:red;
 font-weight:bold;
}


/* CHANNELS */

.channels{
 display:flex;
 gap:15px;
}

.channel{
 background:#181818;
 padding:20px;
 border-radius:15px;
 width:150px;
 text-align:center;
 font-size:18px;
}


/* TV FOCUS */

.focus{
 outline:4px solid #00ff88;
 transform:scale(1.08);
}
</style>

</head>


<body>


<div class="app">


<div class="sidebar">

<div class="logo">
⚽ FOOTBALL PRO
</div>


<div class="menu">

<div class="active">🏠 Home</div>
<div>🔴 Live</div>
<div>📺 Channels</div>
<div>🏆 Leagues</div>
<div>⭐ Favorites</div>
<div>⚙ Settings</div>

</div>

</div>



<div class="content">


<div class="hero">

<h1>
LIVE FOOTBALL TV
</h1>

<p>
Watch your favorite matches in HD
</p>

</div>



<div class="live">

<div class="title">
🔴 LIVE NOW
</div>


<div class="cards">


<div class="card focus">

<div class="livebadge">
● LIVE 78'
</div>

<div class="team">
Real Madrid
⚽
Barcelona
</div>

<div class="score">
2 - 1
</div>

</div>



<div class="card">

<div class="livebadge">
● LIVE
</div>

<div class="team">
Arsenal
⚽
Chelsea
</div>

<div class="score">
1 - 0
</div>

</div>



<div class="card">

<div class="livebadge">
UPCOMING
</div>

<div class="team">
Milan
⚽
Inter
</div>

<div class="score">
20:45
</div>

</div>


</div>

</div>




<div class="live">

<div class="title">
📺 SPORT CHANNELS
</div>


<div class="channels">

<div class="channel">
SPORT HD
</div>

<div class="channel">
FOOTBALL 1
</div>

<div class="channel">
UCL LIVE
</div>

<div class="channel">
PREMIUM
</div>


</div>

</div>



</div>

</div>


<script>

// Android TV remote navigation basic

let items=document.querySelectorAll(".card,.channel,.menu div");

let index=0;

document.addEventListener("keydown",e=>{

items.forEach(x=>x.classList.remove("focus"));

if(e.key==="ArrowRight"){
 index++;
}

if(e.key==="ArrowLeft"){
 index--;
}

if(index<0) index=items.length-1;
if(index>=items.length) index=0;

items[index].classList.add("focus");


if(e.key==="Enter"){
 alert("Hapet: "+items[index].innerText);
}

});

</script>


</body>
</html>
