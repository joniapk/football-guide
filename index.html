<!DOCTYPE html>
<html lang="sq">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Play Shqip</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#000000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}

.header{
height:70px;
background:#0d0000;
border-bottom:2px solid #e10600;
display:flex;
align-items:center;
justify-content:center;
color:#e10600;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-weight:900;
}

.play-logo{
width:45px;
height:45px;
object-fit:contain;
border-radius:50%;
}

.logo span{
font-size:28px;
color:#e10600;
}

.logo small{
display:block;
font-size:12px;
color:white;
}

.wrap{
height:calc(100vh - 70px);
overflow:auto;
padding:18px;
}

.match{
background:linear-gradient(145deg,#1a0808,#0d0303);
border:1px solid #3a1414;
border-radius:20px;
padding:18px;
margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,.7);
}

.tv-focus{
border:2px solid #e10600;
transform:scale(1.03);
box-shadow:0 0 18px rgba(225,6,0,.6);
}

.league{
color:#c9979b;
font-size:14px;
margin-bottom:10px;
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
}

.team{
width:38%;
display:flex;
align-items:center;
gap:10px;
font-size:21px;
font-weight:bold;
}

.team img{
width:50px;
height:50px;
border-radius:50%;
background:#fff;
padding:3px;
}

.center{
text-align:center;
}

.time{
font-size:18px;
color:#e10600;
font-weight:bold;
}

.status{
display:inline-block;
margin-top:8px;
background:#7a0000;
color:#fff;
padding:6px 14px;
border-radius:20px;
font-size:12px;
border:1px solid #e10600;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">

<img class="play-logo"
src="https://i.ibb.co/Kpd6bW8X/logo-256.png">

<div>

<span>
PLAY SHQIP
</span>

<small>
FUTBOLL GUIDE
</small>

</div>

</div>

</div>

<div class="wrap" id="games">
Duke ngarkuar...
</div>
<script>

const leagues=[
4429, // FIFA World Cup
4328, // Premier League
4332, // Serie A
4335, // La Liga
4331, // Bundesliga
4334, // Ligue 1
4304, // Champions League
4337, // Eredivisie
4338, // Primeira Liga
4340, // Scottish Premiership
4341  // Turkish Super Lig
];


let cards=[];
let focus=0;
let auto=true;


const wrap=document.querySelector(".wrap");



const fmt=(d,t)=>

d&&t ?

new Date(d+"T"+t+"Z")
.toLocaleTimeString("sq-AL",
{
hour:"2-digit",
minute:"2-digit",
hour12:false
})

:"--:--";



const fmtDate=d=>{

if(!d) return "";

let date=new Date(d);

let months=[
"Janar",
"Shkurt",
"Mars",
"Prill",
"Maj",
"Qershor",
"Korrik",
"Gusht",
"Shtator",
"Tetor",
"Nëntor",
"Dhjetor"
];

return date.getDate().toString().padStart(2,"0")
+" "+months[date.getMonth()]
+" "+date.getFullYear();

};





async function load(){

let all=[];


await Promise.all(

leagues.map(async id=>{

try{

let r=await fetch(
"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id="+id
);


let j=await r.json();


if(j.events){

all.push(...j.events);

}


}catch(e){}

})

);



all.sort((a,b)=>

(a.dateEvent+a.strTime)
.localeCompare(
b.dateEvent+b.strTime
)

);



games.innerHTML = all.length ?

all.map(ev=>`

<div class="match">


<div class="league">

🏆 ${ev.strLeague||""}

</div>



<div class="row">



<div class="team">


<img src="${ev.strHomeTeamBadge||'https://via.placeholder.com/50'}">


${ev.strHomeTeam||""}


</div>




<div class="center">


<div class="time">

📅 ${fmtDate(ev.dateEvent)}

<br>

⏰ ${fmt(ev.dateEvent,ev.strTime)}

<br>

<span style="
display:block;
margin-top:8px;
color:white;
font-size:14px;
font-weight:bold;
letter-spacing:1px;
">
▶ PLAY SHQIP
</span>

</div>



<div class="status">

SË SHPEJTI

</div>


</div>
<div class="team" style="justify-content:flex-end">


${ev.strAwayTeam||""}


<img src="${ev.strAwayTeamBadge||'https://via.placeholder.com/50'}">


</div>



</div>


</div>


`).join("")


:


"Nuk ka ndeshje futbolli";



cards=[...document.querySelectorAll(".match")];


focus=0;


if(cards[0]){

cards[0].classList.add("tv-focus");

}


}



function pause(){

auto=false;

setTimeout(()=>{

auto=true;

},7000);

}





document.addEventListener("keydown",e=>{


if(!cards.length)return;


pause();



cards.forEach(c=>

c.classList.remove("tv-focus")

);



if(e.key==="ArrowDown"){

focus=(focus+1)%cards.length;

}



if(e.key==="ArrowUp"){

focus=(focus-1+cards.length)%cards.length;

}



cards[focus].classList.add("tv-focus");



cards[focus].scrollIntoView({

behavior:"smooth",

block:"center"

});


});






(function loop(){


if(auto && wrap.scrollHeight>wrap.clientHeight){


wrap.scrollTop++;



if(wrap.scrollTop>=wrap.scrollHeight-wrap.clientHeight)

wrap.scrollTop=0;


}



requestAnimationFrame(loop);


})();






load();


setInterval(load,60000);



</script>


</body>
</html>
