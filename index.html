<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPORT TV</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.header{
    height:90px;
    text-align:center;
    font-size:45px;
    font-weight:bold;
    padding:20px;
    background:#111;
}


.scrollbox{

    height:calc(100vh - 90px);
    overflow:hidden;

}


.container{

    width:90%;
    margin:auto;

}



.card{

    background:#151515;
    margin:25px 0;
    padding:25px;
    border-radius:20px;
    text-align:center;

}



.league{

    font-size:32px;
    color:#ffcc00;
    font-weight:bold;

}



.time{

    font-size:30px;
    margin:15px;

}



.teams{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;

}



.team{

    width:250px;
    font-size:28px;
    font-weight:bold;

}



.logo{

    width:100px;
    height:100px;
    object-fit:contain;

}



.vs{

    font-size:40px;
    color:#ffcc00;
    font-weight:bold;

}



#status{

    text-align:center;
    font-size:25px;
}


</style>

</head>


<body>


<div class="header">
⚽ PLAY SHQIP
</div>


<div id="status">
Duke ngarkuar...
</div>


<div class="scrollbox" id="scrollbox">

<div class="container" id="matches">

</div>

</div>



<script>


async function loadMatches(){


try{


let date =
new Date().toISOString().slice(0,10);



let url =
"https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d="
+date+"&s=Soccer";



let res =
await fetch(url);



let data =
await res.json();



let box =
document.getElementById("matches");

box.innerHTML="";



if(!data.events){

box.innerHTML =
"<h2>Nuk ka ndeshje sot</h2>";

return;

}



data.events.forEach(m=>{


box.innerHTML += `


<div class="card">


<div class="league">

${m.strLeague || "Liga"}

</div>



<div class="time">

${m.strTime ? m.strTime.substring(0,5):"--:--"}

</div>




<div class="teams">


<div class="team">

<img class="logo" src="${m.strHomeTeamBadge || ''}">

<br>

${m.strHomeTeam}

</div>




<div class="vs">

VS

</div>



<div class="team">

<img class="logo" src="${m.strAwayTeamBadge || ''}">

<br>

${m.strAwayTeam}

</div>



</div>


</div>


`;

});


document.getElementById("status").innerHTML="";


}


catch(e){

document.getElementById("status").innerHTML=
"Gabim interneti";

}


}





/* AUTO SCROLL PER ANDROID TV */


let pos = 0;

let speed = 3;



function startScroll(){


let box =
document.getElementById("scrollbox");



function move(){


pos += speed;


box.scrollTop = pos;



if(pos >= box.scrollHeight - box.clientHeight){


setTimeout(()=>{


pos = 0;

box.scrollTop = 0;


},3000);


}



requestAnimationFrame(move);


}



move();


}



loadMatches();



setTimeout(()=>{

startScroll();

},5000);



setInterval(()=>{

loadMatches();

},300000);



</script>


</body>
</html>
