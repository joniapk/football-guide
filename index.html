<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Play Shqip</title>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
}

h1 {
    text-align:center;
    font-size:42px;
}

#status {
    text-align:center;
    font-size:25px;
    margin:20px;
}

table {
    width:96%;
    margin:auto;
    border-collapse:collapse;
    font-size:24px;
}

th {
    background:#0066cc;
    padding:15px;
}

td {
    padding:15px;
    text-align:center;
    border-bottom:2px solid #333;
}

tr:nth-child(even){
    background:#151515;
}

.logo {
    width:70px;
    height:70px;
    object-fit:contain;
}

.team {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
}

.match {
    font-size:28px;
}

</style>

</head>

<body>

<h1>⚽ Play Shqip</h1>

<div id="status">
Duke ngarkuar...
</div>


<table>

<thead>
<tr>
<th>Ora</th>
<th>Ndeshja</th>
<th>Liga</th>
</tr>
</thead>

<tbody id="matches">
</tbody>

</table>


<script>

async function loadMatches(){

try{

let date =
new Date().toISOString().slice(0,10);


let url =
"https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d="
+date+"&s=Soccer";


let res = await fetch(url);

let data = await res.json();


let box=document.getElementById("matches");

box.innerHTML="";


if(!data.events){

document.getElementById("status").innerHTML =
"Nuk ka ndeshje sot";

return;

}


data.events.forEach(game=>{


let homeLogo =
game.strHomeTeamBadge ||
"";

let awayLogo =
game.strAwayTeamBadge ||
"";


box.innerHTML += `

<tr>

<td>
${game.strTime ? game.strTime.substring(0,5) : "-"}
</td>


<td>

<div class="team">

<div>
<img class="logo" src="${homeLogo}">
<br>
${game.strHomeTeam}
</div>


<div class="match">
VS
</div>


<div>
<img class="logo" src="${awayLogo}">
<br>
${game.strAwayTeam}
</div>

</div>

</td>


<td>
${game.strLeague || "-"}
</td>


</tr>

`;

});


document.getElementById("status").innerHTML =
"U përditësua";

}

catch(e){

document.getElementById("status").innerHTML =
"Gabim gjatë lidhjes";

}

}


loadMatches();

setInterval(loadMatches,300000);

</script>


</body>
</html>
